<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena 3D - Mobile</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        
        /* UI Оверлеи */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        .menu-box { background: rgba(0, 0, 0, 0.85); padding: 30px; border-radius: 15px; border: 2px solid #444; pointer-events: auto; text-align: center; color: white; min-width: 300px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .menu-box h1 { margin-top: 0; color: #00ffcc; text-transform: uppercase; letter-spacing: 2px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; background: #222; color: white; box-sizing: border-box; }
        button { background: #00ffcc; color: #000; border: none; padding: 15px 20px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; text-transform: uppercase; }
        button:active { transform: scale(0.95); }
        button.secondary { background: #444; color: white; }
        
        /* Игровой UI */
        #gameUI { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 5; }
        .draggable { position: absolute; pointer-events: auto; user-select: none; transition: opacity 0.3s; }
        
        /* Элементы управления */
        #statsUI { top: 10px; right: 10px; background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 8px; color: #0f0; font-family: monospace; font-size: 14px; text-align: right; pointer-events: none; }
        #joystickZone { bottom: 30px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; pointer-events: auto; }
        #joystickKnob { width: 50px; height: 50px; background: rgba(0, 255, 204, 0.5); border-radius: 50%; position: absolute; top: 35px; left: 35px; }
        #settingsBtn { top: 10px; left: 10px; width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; font-size: 20px; pointer-events: auto; cursor: pointer; }
        
        /* Зона обзора */
        #touchZone { position: absolute; top: 0; right: 0; width: 50%; height: 100%; pointer-events: auto; }

        /* Сообщения */
        #messageOverlay { position: absolute; top: 20%; width: 100%; text-align: center; color: white; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px #000; pointer-events: none; display: none; z-index: 20; }
        #winnerOverlay { position: absolute; top: 0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: #ffd700; display: flex; justify-content: center; align-items: center; font-size: 40px; font-weight: bold; text-transform: uppercase; z-index: 30; display: none; text-shadow: 0 0 20px #ffd700; }

        /* Режим редактирования */
        .edit-mode .draggable { border: 2px dashed #00ffcc; opacity: 0.7; background: rgba(0, 255, 204, 0.2) !important; }
        .edit-mode #touchZone { display: none; } /* Отключаем камеру при редактировании */
        #editControls { position: absolute; bottom: 20px; width: 100%; text-align: center; display: none; pointer-events: auto; z-index: 100; }
        #editControls button { width: auto; padding: 10px 30px; }
        
        #connectionStatus { position: absolute; bottom: 10px; width: 100%; text-align: center; color: #ff4444; font-size: 14px; z-index: 50; }
    </style>
</head>
<body>

    <!-- Three.js и Socket.io -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Пытаемся загрузить socket.io с локального сервера, если нет - с CDN (для превью) -->
    <script src="/socket.io/socket.io.js"></script>
    <script>if(typeof io === 'undefined') document.write('<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"><\/script>');</script>

    <canvas id="gameCanvas"></canvas>

    <!-- Главное Меню -->
    <div id="mainMenu" class="overlay">
        <div class="menu-box">
            <h1>Arena 3D</h1>
            <input type="text" id="nickname" placeholder="Ваш Никнейм" maxlength="12">
            <select id="modelSelect">
                <option value="box">Куб (Сбалансированный)</option>
                <option value="sphere">Сфера (Скользкая)</option>
                <option value="cone">Конус (Тяжелый)</option>
            </select>
            <button id="btnPlay">Играть</button>
            <button id="btnEditUI" class="secondary">Настроить управление</button>
        </div>
    </div>

    <!-- UI Игры -->
    <div id="gameUI">
        <div id="touchZone"></div>
        <div id="statsUI" class="draggable" data-id="stats">FPS: 0<br>Ping: 0ms</div>
        <div id="settingsBtn" class="draggable" data-id="settings">⚙</div>
        
        <div id="joystickZone" class="draggable" data-id="joystick">
            <div id="joystickKnob"></div>
        </div>
    </div>

    <!-- Режим редактирования UI -->
    <div id="editControls">
        <button id="btnSaveUI">Сохранить UI</button>
    </div>

    <div id="messageOverlay">Ожидание игроков...</div>
    <div id="winnerOverlay">ПОБЕДА: <span id="winnerText"></span></div>
    <div id="connectionStatus"></div>

    <script>
        // --- СЕТЕВАЯ ЛОГИКА ---
        let socket;
        try {
            socket = io();
        } catch(e) {
            document.getElementById('connectionStatus').innerText = "Ошибка подключения (Запустите сервер Node.js)";
        }

        let myId = null;
        let pingInterval;
        let currentPing = 0;

        if(socket) {
            socket.on('connect', () => {
                myId = socket.id;
                document.getElementById('connectionStatus').innerText = "";
                
                // Расчет пинга
                pingInterval = setInterval(() => {
                    socket.emit('ping');
                    socket.pingTime = Date.now();
                }, 1000);
            });

            socket.on('pong', () => {
                currentPing = Date.now() - socket.pingTime;
            });

            socket.on('disconnect', () => {
                document.getElementById('connectionStatus').innerText = "Соединение потеряно. Переподключение...";
            });

            socket.on('lobbyTimer', (time) => {
                const msg = document.getElementById('messageOverlay');
                msg.style.display = 'block';
                if(time > 0) msg.innerText = `Игра начнется через ${time}...`;
                else msg.innerText = `Ожидание игроков...`;
            });

            socket.on('gameStart', (serverPlayers) => {
                document.getElementById('messageOverlay').style.display = 'none';
                initGame(serverPlayers);
            });

            socket.on('stateUpdate', (serverPlayers) => {
                updateNetworkPlayers(serverPlayers);
            });

            socket.on('playerDied', (id) => {
                removePlayer(id);
            });

            socket.on('playerLeft', (id) => {
                removePlayer(id);
            });

            socket.on('gameOver', (data) => {
                const winScreen = document.getElementById('winnerOverlay');
                document.getElementById('winnerText').innerText = data.winner;
                winScreen.style.display = 'flex';
                document.getElementById('gameUI').style.display = 'none';
            });

            socket.on('resetToLobby', () => {
                document.getElementById('winnerOverlay').style.display = 'none';
                document.getElementById('mainMenu').style.display = 'flex';
                clearScene();
            });
        }

        // --- ЛОГИКА UI И DRAGGABLE ---
        const uiElements = document.querySelectorAll('.draggable');
        let isEditMode = false;

        // Восстановление позиций из localStorage
        function loadUIPositions() {
            uiElements.forEach(el => {
                const id = el.getAttribute('data-id');
                const saved = localStorage.getItem('ui_' + id);
                if(saved) {
                    const pos = JSON.parse(saved);
                    el.style.left = pos.left;
                    el.style.top = pos.top;
                    el.style.right = pos.right;
                    el.style.bottom = pos.bottom;
                }
            });
        }
        loadUIPositions();

        document.getElementById('btnEditUI').addEventListener('click', () => {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameUI').style.display = 'block';
            document.getElementById('editControls').style.display = 'block';
            document.getElementById('gameUI').classList.add('edit-mode');
            isEditMode = true;
        });

        document.getElementById('btnSaveUI').addEventListener('click', () => {
            document.getElementById('mainMenu').style.display = 'flex';
            document.getElementById('gameUI').style.display = 'none';
            document.getElementById('editControls').style.display = 'none';
            document.getElementById('gameUI').classList.remove('edit-mode');
            isEditMode = false;

            // Сохраняем в localStorage
            uiElements.forEach(el => {
                const id = el.getAttribute('data-id');
                localStorage.setItem('ui_' + id, JSON.stringify({
                    left: el.style.left,
                    top: el.style.top,
                    right: el.style.right,
                    bottom: el.style.bottom
                }));
            });
        });

        // Перетаскивание (Touch & Mouse)
        uiElements.forEach(el => {
            let startX, startY, initLeft, initTop;

            const startDrag = (x, y) => {
                if(!isEditMode) return;
                startX = x;
                startY = y;
                // Сбрасываем right/bottom чтобы left/top работали корректно
                const rect = el.getBoundingClientRect();
                initLeft = rect.left;
                initTop = rect.top;
                el.style.right = 'auto';
                el.style.bottom = 'auto';
                el.style.left = initLeft + 'px';
                el.style.top = initTop + 'px';
            };

            const moveDrag = (x, y) => {
                if(!isEditMode || startX === undefined) return;
                const dx = x - startX;
                const dy = y - startY;
                el.style.left = (initLeft + dx) + 'px';
                el.style.top = (initTop + dy) + 'px';
            };

            const endDrag = () => { startX = undefined; };

            el.addEventListener('touchstart', e => startDrag(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
            el.addEventListener('touchmove', e => { if(isEditMode) e.preventDefault(); moveDrag(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
            el.addEventListener('touchend', endDrag);

            el.addEventListener('mousedown', e => startDrag(e.clientX, e.clientY));
            document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
            document.addEventListener('mouseup', endDrag);
        });


        // --- ВХОД В ИГРУ ---
        document.getElementById('btnPlay').addEventListener('click', () => {
            const nick = document.getElementById('nickname').value || 'Игрок_' + Math.floor(Math.random()*1000);
            const model = document.getElementById('modelSelect').value;
            
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameUI').style.display = 'block';
            document.getElementById('messageOverlay').style.display = 'block';
            
            if(socket) socket.emit('join', { nick, model });
        });


        // --- THREE.JS ИГРОВОЙ ДВИЖОК ---
        const canvas = document.getElementById('gameCanvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: false }); // Отключено для оптимизации
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // Ограничение для мобилок
        renderer.setSize(window.innerWidth, window.innerHeight);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.Fog(0x0a0a1a, 10, 50);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        
        // Свет
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0x00ffcc, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Платформа (Арена)
        const platformGeo = new THREE.CylinderGeometry(15, 15, 2, 32);
        const platformMat = new THREE.MeshLambertMaterial({ color: 0x222233, wireframe: false });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = -1;
        scene.add(platform);

        // Сетка для кибер-стиля
        const gridHelper = new THREE.GridHelper(30, 30, 0x00ffcc, 0x004433);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // Переменные состояния
        const otherPlayers = {};
        let localPlayer = null;
        let isDead = false;

        // Камера и Управление
        let camRadius = 10;
        let camTheta = 0; // Вращение по XZ
        let camPhi = Math.PI / 3; // Вращение по Y
        
        // Ввод
        const input = { x: 0, z: 0 };
        const joystickZone = document.getElementById('joystickZone');
        const joystickKnob = document.getElementById('joystickKnob');
        let jStart = null;

        // Джойстик (Левая часть)
        joystickZone.addEventListener('touchstart', e => {
            if(isEditMode) return;
            const rect = joystickZone.getBoundingClientRect();
            const cx = rect.left + rect.width/2;
            const cy = rect.top + rect.height/2;
            jStart = { x: cx, y: cy };
            updateJoystick(e.touches[0]);
        });
        joystickZone.addEventListener('touchmove', e => {
            if(isEditMode || !jStart) return;
            e.preventDefault();
            updateJoystick(e.touches[0]);
        }, {passive: false});
        joystickZone.addEventListener('touchend', e => {
            if(isEditMode) return;
            jStart = null;
            input.x = 0; input.z = 0;
            joystickKnob.style.transform = `translate(0px, 0px)`;
        });

        function updateJoystick(touch) {
            const dx = touch.clientX - jStart.x;
            const dy = touch.clientY - jStart.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 35;
            
            let nx = dx; let ny = dy;
            if(dist > maxDist) {
                nx = (dx / dist) * maxDist;
                ny = (dy / dist) * maxDist;
            }
            
            joystickKnob.style.transform = `translate(${nx}px, ${ny}px)`;
            
            // Нормализуем для ввода (-1 до 1)
            input.x = nx / maxDist;
            input.z = ny / maxDist;
        }

        // Обзор камеры (Правая часть)
        const touchZone = document.getElementById('touchZone');
        let camTouchStart = null;
        touchZone.addEventListener('touchstart', e => {
            if(isEditMode) return;
            camTouchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        });
        touchZone.addEventListener('touchmove', e => {
            if(isEditMode || !camTouchStart) return;
            e.preventDefault();
            const dx = e.touches[0].clientX - camTouchStart.x;
            const dy = e.touches[0].clientY - camTouchStart.y;
            
            camTheta -= dx * 0.01;
            camPhi -= dy * 0.01;
            
            // Ограничение по вертикали
            camPhi = Math.max(0.1, Math.min(Math.PI / 2 - 0.1, camPhi));
            
            camTouchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }, {passive: false});
        touchZone.addEventListener('touchend', () => camTouchStart = null);

        // Фабрика игроков
        const geometries = {
            box: new THREE.BoxGeometry(1.5, 1.5, 1.5),
            sphere: new THREE.SphereGeometry(1, 16, 16),
            cone: new THREE.ConeGeometry(1, 2, 16)
        };

        function createLabel(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64;
            ctx.font = "bold 24px Arial";
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.shadowColor = "black";
            ctx.shadowBlur = 4;
            ctx.fillText(text, 128, 40);
            
            const tex = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: tex });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(4, 1, 1);
            sprite.position.y = 2;
            return sprite;
        }

        function spawnPlayer(data, isLocal) {
            const group = new THREE.Group();
            
            const geo = geometries[data.model] || geometries.box;
            const mat = new THREE.MeshLambertMaterial({ 
                color: isLocal ? 0x00ffcc : 0xff3366 
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = geo.parameters.height ? geo.parameters.height/2 : geo.parameters.radius || 0.75;
            
            group.add(mesh);
            group.add(createLabel(data.nick));
            
            group.position.set(data.x, data.y, data.z);
            scene.add(group);
            
            return { group, mesh };
        }

        function initGame(serverPlayers) {
            clearScene();
            isDead = false;
            
            for(let id in serverPlayers) {
                const p = serverPlayers[id];
                if(id === myId) {
                    localPlayer = spawnPlayer(p, true);
                    camTheta = 0;
                } else {
                    otherPlayers[id] = spawnPlayer(p, false);
                }
            }
        }

        function updateNetworkPlayers(serverPlayers) {
            for(let id in serverPlayers) {
                if(id === myId) continue; // Себя обновляем локально
                
                const p = serverPlayers[id];
                if(otherPlayers[id]) {
                    // Простая интерполяция (Lerp) к целевой позиции
                    otherPlayers[id].group.position.lerp(new THREE.Vector3(p.x, p.y, p.z), 0.3);
                    otherPlayers[id].mesh.rotation.y = p.rotation;
                } else {
                    otherPlayers[id] = spawnPlayer(p, false);
                }
            }
        }

        function removePlayer(id) {
            if(otherPlayers[id]) {
                scene.remove(otherPlayers[id].group);
                delete otherPlayers[id];
            }
        }

        function clearScene() {
            if(localPlayer) { scene.remove(localPlayer.group); localPlayer = null; }
            for(let id in otherPlayers) {
                scene.remove(otherPlayers[id].group);
            }
            // Object.keys(otherPlayers).forEach(k => delete otherPlayers[k]);
        }

        // Логика кадра
        const speed = 0.15;
        let lastTime = performance.now();
        let frames = 0;
        const statsUI = document.getElementById('statsUI');

        function animate() {
            requestAnimationFrame(animate);

            // FPS Counter
            const now = performance.now();
            frames++;
            if(now - lastTime >= 1000) {
                statsUI.innerHTML = `FPS: ${frames}<br>Ping: ${currentPing}ms`;
                frames = 0;
                lastTime = now;
            }

            if(localPlayer && !isDead && !isEditMode) {
                // Движение относительно камеры
                const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), camTheta);
                const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), camTheta);
                
                const moveVec = new THREE.Vector3();
                moveVec.addScaledVector(right, input.x);
                moveVec.addScaledVector(forward, -input.z); // -z потому что джойстик вверх это -z
                
                if(moveVec.lengthSq() > 0) {
                    moveVec.normalize().multiplyScalar(speed);
                    localPlayer.group.position.add(moveVec);
                    
                    // Поворот модели по направлению движения
                    const targetAngle = Math.atan2(-moveVec.x, -moveVec.z);
                    // Плавный поворот
                    localPlayer.mesh.rotation.y += (targetAngle - localPlayer.mesh.rotation.y) * 0.2;
                }

                // Базовые коллизии на клиенте (чтобы расталкивать друг друга)
                for(let id in otherPlayers) {
                    const other = otherPlayers[id];
                    const dist = localPlayer.group.position.distanceTo(other.group.position);
                    if(dist < 2.0) { // Радиус коллизии
                        const pushDir = localPlayer.group.position.clone().sub(other.group.position).normalize();
                        localPlayer.group.position.add(pushDir.multiplyScalar(0.1)); // Отталкивание себя
                    }
                }

                // Проверка падения (Радиус платформы 15)
                const distFromCenter = Math.sqrt(localPlayer.group.position.x**2 + localPlayer.group.position.z**2);
                if(distFromCenter > 15) {
                    // Гравитация
                    localPlayer.group.position.y -= 0.3;
                    if(localPlayer.group.position.y < -10) {
                        isDead = true;
                        if(socket) socket.emit('died');
                    }
                }

                // Обновление камеры (Следование за игроком)
                const cx = localPlayer.group.position.x + camRadius * Math.sin(camPhi) * Math.sin(camTheta);
                const cy = localPlayer.group.position.y + camRadius * Math.cos(camPhi);
                const cz = localPlayer.group.position.z + camRadius * Math.sin(camPhi) * Math.cos(camTheta);
                
                camera.position.set(cx, cy, cz);
                camera.lookAt(localPlayer.group.position);

                // Отправка на сервер (Throttling можно сделать на сервере, тут отправляем каждый кадр для плавности,
                // но в реальном проекте лучше слать 10-20 раз в сек)
                if(socket && frames % 2 === 0) { // Отправляем каждый второй кадр для оптимизации
                    socket.emit('updatePos', {
                        x: localPlayer.group.position.x,
                        y: localPlayer.group.position.y,
                        z: localPlayer.group.position.z,
                        rotation: localPlayer.mesh.rotation.y
                    });
                }
            } else if (isDead && localPlayer) {
                 // Камера смотрит на центр если умер
                 camera.position.lerp(new THREE.Vector3(0, 20, 20), 0.05);
                 camera.lookAt(0,0,0);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Старт цикла рендера
        animate();
    </script>
</body>
</html>
