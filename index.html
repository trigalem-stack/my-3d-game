<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Multiplayer</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #87CEEB; 
        }
        canvas { 
            display: block; 
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-family: sans-serif;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <b>Управление:</b><br>
        WASD или Стрелочки
    </div>

    <!-- Подключаем Three.js и Socket.io -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    
    <script>
        const socket = io();

        // 1. НАСТРОЙКА СЦЕНЫ
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Голубое небо
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. ОСВЕЩЕНИЕ
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // 3. ЗЕМЛЯ (Плоскость)
        const planeGeometry = new THREE.PlaneGeometry(200, 200);
        const planeMaterial = new THREE.MeshLambertMaterial({ color: 0x4CAF50 });
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.rotation.x = -Math.PI / 2;
        scene.add(plane);

        // 4. ИГРОКИ
        const players = {};
        const cubeGeometry = new THREE.BoxGeometry(1, 1, 1);

        function addPlayer(playerInfo) {
            const material = new THREE.MeshLambertMaterial({ color: playerInfo.color });
            const cube = new THREE.Mesh(cubeGeometry, material);
            cube.position.set(playerInfo.x, playerInfo.y, playerInfo.z);
            scene.add(cube);
            players[playerInfo.id] = cube;
        }

        // Сетевые события
        socket.on('currentPlayers', (serverPlayers) => {
            Object.keys(serverPlayers).forEach((id) => {
                if (!players[id]) addPlayer(serverPlayers[id]);
            });
        });

        socket.on('newPlayer', (playerInfo) => {
            addPlayer(playerInfo);
        });

        socket.on('playerMoved', (playerInfo) => {
            if (players[playerInfo.id]) {
                players[playerInfo.id].position.x = playerInfo.x;
                players[playerInfo.id].position.z = playerInfo.z;
            }
        });

        socket.on('playerDisconnected', (id) => {
            if (players[id]) {
                scene.remove(players[id]);
                players[id].geometry.dispose();
                players[id].material.dispose();
                delete players[id];
            }
        });

        // 5. УПРАВЛЕНИЕ
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };
        const speed = 0.15;

        document.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        // 6. ИГРОВОЙ ЦИКЛ
        function animate() {
            requestAnimationFrame(animate);

            if (socket.id && players[socket.id]) {
                const myCube = players[socket.id];
                let moved = false;

                if (keys.w || keys.ArrowUp) { myCube.position.z -= speed; moved = true; }
                if (keys.s || keys.ArrowDown) { myCube.position.z += speed; moved = true; }
                if (keys.a || keys.ArrowLeft) { myCube.position.x -= speed; moved = true; }
                if (keys.d || keys.ArrowRight) { myCube.position.x += speed; moved = true; }

                // Плавное следование камеры за кубом игрока
                camera.position.x = myCube.position.x;
                camera.position.y = myCube.position.y + 5;
                camera.position.z = myCube.position.z + 8;
                camera.lookAt(myCube.position);

                // Отправляем новые координаты на сервер, если сдвинулись
                if (moved) {
                    socket.emit('playerMovement', { x: myCube.position.x, z: myCube.position.z });
                }
            }

            renderer.render(scene, camera);
        }

        // Обработка изменения размера окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
