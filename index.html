<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Mobile Multiplayer</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #87CEEB; 
            touch-action: none; /* Запрещаем скролл и зум на мобильных */
            user-select: none;
            -webkit-user-select: none;
        }
        canvas { display: block; }
        
        /* Стартовое меню */
        #start-menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #play-btn {
            padding: 20px 50px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            background-color: #4CAF50;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #play-btn:active { background-color: #45a049; transform: scale(0.95); }

        /* Игровой интерфейс (джойстик и камера) */
        #game-ui {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; /* Скрыто до старта */
            z-index: 10;
        }
        #joystick-zone {
            position: absolute;
            bottom: 0; left: 0;
            width: 50%; height: 100%;
        }
        #camera-zone {
            position: absolute;
            top: 0; right: 0;
            width: 50%; height: 100%;
        }
    </style>
</head>
<body>

    <div id="start-menu">
        <button id="play-btn">ИГРАТЬ</button>
    </div>

    <div id="game-ui">
        <div id="joystick-zone"></div>
        <div id="camera-zone"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    
    <script>
        const socket = io();
        let isPlaying = false;

        // --- 1. НАСТРОЙКА СЦЕНЫ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        const planeGeometry = new THREE.PlaneGeometry(200, 200);
        const planeMaterial = new THREE.MeshLambertMaterial({ color: 0x4CAF50 });
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.rotation.x = -Math.PI / 2;
        scene.add(plane);

        // --- 2. ИГРОКИ ---
        const players = {};
        const cubeGeometry = new THREE.BoxGeometry(1, 1, 1);

        function addPlayer(playerInfo) {
            const material = new THREE.MeshLambertMaterial({ color: playerInfo.color });
            const cube = new THREE.Mesh(cubeGeometry, material);
            cube.position.set(playerInfo.x, playerInfo.y, playerInfo.z);
            scene.add(cube);
            players[playerInfo.id] = cube;
        }

        socket.on('currentPlayers', (serverPlayers) => {
            Object.keys(serverPlayers).forEach((id) => {
                if (!players[id]) addPlayer(serverPlayers[id]);
            });
        });

        socket.on('newPlayer', (playerInfo) => { addPlayer(playerInfo); });

        socket.on('playerMoved', (playerInfo) => {
            if (players[playerInfo.id]) {
                players[playerInfo.id].position.x = playerInfo.x;
                players[playerInfo.id].position.z = playerInfo.z;
            }
        });

        socket.on('playerDisconnected', (id) => {
            if (players[id]) {
                scene.remove(players[id]);
                players[id].geometry.dispose();
                players[id].material.dispose();
                delete players[id];
            }
        });

        // --- 3. УПРАВЛЕНИЕ (Мобильное) ---
        let moveVector = { x: 0, y: 0 };
        let cameraAngleX = 0; // Вращение влево/вправо
        let cameraAngleY = 0.5; // Наклон вверх/вниз
        const cameraDistance = 8;

        // Настройка джойстика (левая часть)
        const joystickManager = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'dynamic',
            color: 'white',
            size: 120
        });

        joystickManager.on('move', (evt, data) => {
            // data.vector.y > 0 это движение вперед
            moveVector.x = data.vector.x; 
            moveVector.y = data.vector.y; 
        });
        joystickManager.on('end', () => {
            moveVector.x = 0;
            moveVector.y = 0;
        });

        // Настройка вращения камеры (правая часть)
        const camZone = document.getElementById('camera-zone');
        let isDraggingCam = false;
        let previousTouch = { x: 0, y: 0 };

        camZone.addEventListener('touchstart', (e) => {
            isDraggingCam = true;
            previousTouch.x = e.touches[0].pageX;
            previousTouch.y = e.touches[0].pageY;
        });

        camZone.addEventListener('touchmove', (e) => {
            if (!isDraggingCam) return;
            const deltaX = e.touches[0].pageX - previousTouch.x;
            const deltaY = e.touches[0].pageY - previousTouch.y;

            cameraAngleX -= deltaX * 0.01;
            cameraAngleY += deltaY * 0.01;

            // Ограничиваем наклон камеры, чтобы не заглядывать под землю и не перекручиваться
            if (cameraAngleY < 0.1) cameraAngleY = 0.1;
            if (cameraAngleY > Math.PI / 2.2) cameraAngleY = Math.PI / 2.2;

            previousTouch.x = e.touches[0].pageX;
            previousTouch.y = e.touches[0].pageY;
        });

        camZone.addEventListener('touchend', () => { isDraggingCam = false; });

        // --- 4. СТАРТ ИГРЫ ---
        document.getElementById('play-btn').addEventListener('click', () => {
            document.getElementById('start-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            isPlaying = true;
            socket.emit('joinGame');
        });

        // --- 5. ИГРОВОЙ ЦИКЛ ---
        const speed = 0.15;

        function animate() {
            requestAnimationFrame(animate);

            if (isPlaying && socket.id && players[socket.id]) {
                const myCube = players[socket.id];
                
                // Вычисляем векторы направления на основе угла камеры
                const forwardX = -Math.sin(cameraAngleX);
                const forwardZ = -Math.cos(cameraAngleX);
                const rightX = Math.cos(cameraAngleX);
                const rightZ = -Math.sin(cameraAngleX);

                // Если джойстик отклонен, двигаем куб
                if (moveVector.x !== 0 || moveVector.y !== 0) {
                    myCube.position.x += (forwardX * moveVector.y + rightX * moveVector.x) * speed;
                    myCube.position.z += (forwardZ * moveVector.y + rightZ * moveVector.x) * speed;
                    
                    socket.emit('playerMovement', { x: myCube.position.x, z: myCube.position.z });
                }

                // Позиционируем камеру вокруг игрока (Third-Person)
                camera.position.x = myCube.position.x + cameraDistance * Math.sin(cameraAngleX) * Math.cos(cameraAngleY);
                camera.position.y = myCube.position.y + cameraDistance * Math.sin(cameraAngleY);
                camera.position.z = myCube.position.z + cameraDistance * Math.cos(cameraAngleX) * Math.cos(cameraAngleY);
                camera.lookAt(myCube.position);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
