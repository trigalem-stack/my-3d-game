<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Escape the Backrooms 3D - Online & Offline</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        /* Принудительный альбомный режим */
        @media screen and (orientation: portrait) {
            #rotateDevice { display: flex !important; }
        }
        #rotateDevice { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; justify-content: center; align-items: center; text-align: center; font-size: 24px; color: #d4b848; padding: 20px; box-sizing: border-box; }

        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; z-index: 100; overflow-y: auto; }
        .hidden { display: none !important; }
        .text-center { text-align: center; padding: 20px; max-width: 600px; width: 90%; }
        h1 { color: #d4b848; margin-bottom: 10px; text-shadow: 2px 2px 5px #000; }
        p { font-size: 16px; line-height: 1.5; color: #ccc; }
        
        input.menu-input { width: 100%; padding: 10px; font-size: 18px; margin-bottom: 10px; background: #222; color: #fff; border: 2px solid #d4b848; border-radius: 5px; text-align: center; font-family: inherit; box-sizing: border-box; }
        button.menu-btn, select.menu-btn { background: #d4b848; color: #000; border: 2px solid #887422; padding: 15px 20px; font-size: 18px; font-weight: bold; font-family: inherit; margin-top: 10px; border-radius: 5px; cursor: pointer; transition: 0.2s; width: 100%; box-sizing: border-box; }
        button.menu-btn:hover, select.menu-btn:hover { background: #e8c94e; transform: scale(1.02); }
        button.menu-btn:active, button.menu-btn:disabled { background: #aa9338; transform: scale(0.98); }
        button.menu-btn:disabled { cursor: not-allowed; opacity: 0.7; }
        select.menu-btn { outline: none; appearance: none; text-align: center; }
        
        /* Списки и скролл */
        .scrollable-list { max-height: 40vh; overflow-y: auto; width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #d4b848; border-radius: 5px; margin-bottom: 10px; padding: 5px; box-sizing: border-box; }
        .list-item { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); display: flex; justify-content: space-between; align-items: center; }
        .list-item:last-child { border-bottom: none; }
        
        #hud { position: absolute; top: 10px; left: 10px; pointer-events: auto; }
        #keysCount { font-size: 20px; font-weight: bold; color: #fff; text-shadow: 1px 1px 2px #000;}
        #staminaContainer { width: 150px; height: 10px; background: rgba(50,50,50,0.5); border: 2px solid #555; margin-top: 10px; border-radius: 5px; overflow: hidden;}
        #staminaBar { width: 100%; height: 100%; background: #0088ff; transition: width 0.1s linear, background-color 0.3s; }
        #staminaBar.exhausted { background: #ff3333; }
        #messages { position: absolute; top: 20%; width: 100%; text-align: center; font-size: 18px; color: #fff; text-shadow: 1px 1px 3px #000; opacity: 0; transition: opacity 0.3s;}
        
        #btnFullscreen { position: absolute; top: 10px; right: 10px; padding: 10px; font-size: 14px; pointer-events: auto; background: rgba(50,50,50,0.5); border: 1px solid #fff; color: white; border-radius: 5px; cursor: pointer;}
        .action-btn { position: absolute; width: 60px; height: 60px; border-radius: 50%; background: rgba(200,200,200,0.2); border: 2px solid rgba(255,255,255,0.5); pointer-events: auto; font-size: 24px; display:flex; justify-content:center; align-items:center; color: white; transition: 0.2s; backdrop-filter: blur(2px);}
        .action-btn.active { background: rgba(255,255,255,0.8); color: black; box-shadow: 0 0 15px rgba(255,255,255,0.5); border-color: #fff;}
        
        #btnFlashlight { bottom: 20px; right: 20px; }
        #btnJump { bottom: 20px; right: 90px; }
        #btnRun { bottom: 90px; right: 20px; }
        #btnTeleport { bottom: 90px; right: 90px; background: rgba(255, 0, 0, 0.4); display: none; }
        
        #joystickBase { position: absolute; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); transform: translate(-50%, -50%); display: none; pointer-events: none; z-index: 50; backdrop-filter: blur(2px);}
        #joystickStick { position: absolute; width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.8); transform: translate(-50%, -50%); top: 50%; left: 50%; pointer-events: none; box-shadow: 0 0 10px rgba(0,0,0,0.5);}

        #vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; box-shadow: inset 0 0 150px rgba(0,0,0,0.9); z-index: 5;}
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: rgba(255,255,255,0.5); transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; z-index: 6;}
        
        #screamerLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #550000; background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 2px, #000 4px); opacity: 0.9; z-index: 1000; display: none; mix-blend-mode: multiply; animation: glitch 0.05s infinite; }
        #spectatorUI { position: absolute; bottom: 30px; width: 100%; text-align: center; display: none; pointer-events: auto; z-index: 20; }
        .spec-btn { background: rgba(0,0,0,0.7); color: #fff; border: 2px solid #d4b848; padding: 10px 20px; font-size: 20px; cursor: pointer; border-radius: 5px; margin: 0 10px; }
        #spectatingName { font-size: 24px; color: #d4b848; font-weight: bold; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 5px; display: inline-block; vertical-align: middle;}
        .player-name-label { position: absolute; color: white; text-shadow: 1px 1px 2px black; font-weight: bold; pointer-events: none; transform: translate(-50%, -50%); z-index: 4; }
        .player-name-label.monster { color: #ff3333; }

        /* Кастомное модальное окно */
        #customAlert { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .alert-box { background: #222; border: 2px solid #d4b848; padding: 20px; border-radius: 10px; text-align: center; width: 300px; }
        .flex-row { display: flex; gap: 10px; }

        @keyframes glitch { 0% { transform: translate(0) } 20% { transform: translate(-10px, 10px) } 40% { transform: translate(-10px, -10px) } 60% { transform: translate(10px, 10px) } 80% { transform: translate(10px, -10px) } 100% { transform: translate(0) } }
    </style>
</head>
<body>

<div id="rotateDevice">Переверните телефон в горизонтальное положение!</div>

<div id="customAlert" class="hidden">
    <div class="alert-box">
        <h3 id="alertTitle" style="color:#d4b848; margin-top:0;">Внимание</h3>
        <p id="alertText" style="color:#fff;"></p>
        <input type="text" id="alertInput" class="menu-input hidden" placeholder="Введите пароль...">
        <div class="flex-row">
            <button id="alertBtnCancel" class="menu-btn hidden" style="background:#555; color:#fff; border-color:#333;">Отмена</button>
            <button id="alertBtnOk" class="menu-btn">ОК</button>
        </div>
    </div>
</div>

<div id="uiLayer">
    <div id="hud">
        <div id="keysCount">Папки с данными: 0/8</div>
        <div id="staminaContainer"><div id="staminaBar"></div></div>
    </div>
    <div id="messages">Сообщение</div>
    <div id="vignette"></div>
    <div id="crosshair"></div>
    <button id="btnFullscreen">На весь экран</button>
    <div id="btnFlashlight" class="action-btn active">💡</div>
    <div id="btnRun" class="action-btn">🏃</div>
    <div id="btnJump" class="action-btn">⏫</div>
    <div id="btnTeleport" class="action-btn">🌀</div>
    <div id="joystickBase"><div id="joystickStick"></div></div>
    
    <div id="spectatorUI">
        <button id="specPrev" class="spec-btn">&lt;</button>
        <span id="spectatingName">Наблюдение</span>
        <button id="specNext" class="spec-btn">&gt;</button>
    </div>
</div>
<div id="labelsContainer" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index: 5;"></div>
<div id="screamerLayer"></div>

<div id="startScreen" class="overlay">
    <div class="text-center">
        <h1>THE BACKROOMS</h1>
        <input type="text" id="playerName" class="menu-input" placeholder="Введите ваш ник" maxlength="12">
        <select id="diffSelect" class="menu-btn" style="margin-bottom: 10px;">
            <option value="easy">Оффлайн Сложность: Лёгкая</option>
            <option value="normal" selected>Оффлайн Сложность: Нормальная</option>
            <option value="hard">Оффлайн Сложность: Сложная</option>
            <option value="extreme">Оффлайн Сложность: Экстрим</option>
        </select>
        <button id="btnStartOffline" class="menu-btn">Играть Оффлайн</button>
        <button id="btnOnlineBrowser" class="menu-btn">Играть Онлайн</button>
    </div>
</div>

<div id="browserScreen" class="overlay hidden">
    <div class="text-center">
        <h1>Список Лобби</h1>
        <input type="text" id="searchLobby" class="menu-input" placeholder="Поиск по названию...">
        <div id="lobbyList" class="scrollable-list"></div>
        <div class="flex-row">
            <button id="btnBackToMenu" class="menu-btn" style="background:#555; color:#fff; border-color:#333;">Назад</button>
            <button id="btnCreateLobbyUI" class="menu-btn">Создать Лобби</button>
        </div>
    </div>
</div>

<div id="createLobbyScreen" class="overlay hidden">
    <div class="text-center">
        <h1>Создать Лобби</h1>
        <input type="text" id="lobbyName" class="menu-input" placeholder="Название лобби" maxlength="20">
        <input type="number" id="lobbyMax" class="menu-input" placeholder="Игроков (2-8)" min="2" max="8" value="4">
        <input type="text" id="lobbyPass" class="menu-input" placeholder="Пароль (необязательно)" maxlength="10">
        <div class="flex-row">
            <button id="btnCancelCreate" class="menu-btn" style="background:#555; color:#fff; border-color:#333;">Отмена</button>
            <button id="btnConfirmCreate" class="menu-btn">Создать</button>
        </div>
    </div>
</div>

<div id="lobbyScreen" class="overlay hidden">
    <div class="text-center">
        <h1 id="lobbyTitleText" style="color:yellow">Ожидание...</h1>
        <h2 id="lobbyTimerText" style="color:#fff">Ждем игроков...</h2>
        <div style="text-align: left; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;">
            <p style="margin: 0 0 10px 0; color: #d4b848;">Список игроков (<span id="lobbyPlayersCount">1/8</span>):</p>
            <div id="lobbyPlayersList" class="scrollable-list" style="max-height: 20vh;"></div>
        </div>
        
        <div id="votingArea" class="hidden" style="margin-top: 15px; text-align: left;">
            <h3 id="voteTitle" style="text-align: center; color: #d4b848;">Голосование:</h3>
            <div id="voteButtons"></div>
        </div>
        <button id="btnLeaveLobby" class="menu-btn" style="background:#ff3333; color:#fff; border-color:#880000; margin-top: 20px;">Покинуть Лобби</button>
    </div>
</div>

<div id="gameOverScreen" class="overlay hidden">
    <div class="text-center">
        <h1 id="endTitle">ВЫ ПОГИБЛИ</h1>
        <p id="endText">Сущность настигла вас.</p>
        <button id="btnRestart" class="menu-btn">В меню</button>
    </div>
</div>

<script>
// --- КАСТОМНЫЕ МОДАЛКИ (ВМЕСТО ALERT/PROMPT) ---
let alertCallback = null;
function showCustomAlert(title, text, isPrompt = false, callback = null) {
    document.getElementById('customAlert').classList.remove('hidden');
    document.getElementById('alertTitle').textContent = title;
    document.getElementById('alertText').textContent = text;
    document.getElementById('alertInput').value = '';
    alertCallback = callback;
    
    if (isPrompt) {
        document.getElementById('alertInput').classList.remove('hidden');
        document.getElementById('alertBtnCancel').classList.remove('hidden');
        document.getElementById('alertInput').focus();
    } else {
        document.getElementById('alertInput').classList.add('hidden');
        document.getElementById('alertBtnCancel').classList.add('hidden');
    }
}
document.getElementById('alertBtnOk').addEventListener('click', () => {
    document.getElementById('customAlert').classList.add('hidden');
    let val = document.getElementById('alertInput').value;
    if(alertCallback) alertCallback(val);
});
document.getElementById('alertBtnCancel').addEventListener('click', () => {
    document.getElementById('customAlert').classList.add('hidden');
    if(alertCallback) alertCallback(null);
});

// --- ОБЩИЕ ПЕРЕМЕННЫЕ И АУДИО ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;
const synth = {
    init: () => { if(!audioCtx) audioCtx = new AudioContext(); if(audioCtx.state === 'suspended') audioCtx.resume(); },
    playTone: (freq, type, dur, vol) => { if(!audioCtx) return; let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain(); osc.type = type; osc.frequency.value = freq; osc.connect(gain); gain.connect(audioCtx.destination); gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur); osc.start(); osc.stop(audioCtx.currentTime + dur); },
    pickup: () => { synth.playTone(600, 'sine', 0.2, 0.3); setTimeout(() => synth.playTone(900, 'sine', 0.4, 0.3), 100); },
    step: () => synth.playTone(40, 'sine', 0.1, 0.03),
    jump: () => synth.playTone(120, 'sine', 0.2, 0.1),
    land: () => synth.playTone(60, 'square', 0.15, 0.1),
    screamer: () => { synth.playTone(40, 'sawtooth', 2.5, 1.0); synth.playTone(60, 'square', 2.0, 0.8); }
};

const MAP_SIZE = 21; const BLOCK_SIZE = 4; const WALL_HEIGHT = BLOCK_SIZE * 1.2;
let maxKeysOffline = 8; let targetKeys = 8;
let scene, camera, renderer, flashlight;
let mapData = []; let keysMeshes = []; let exitMesh;
let monsterGroup, mArmL, mArmR, mLegL, mLegR;
let lastTime = 0; let gameState = 'start'; let msgTimer = 0;
let isOnline = false; let socket = null; let currentRoom = null;
let onlinePlayers = {}; let myId = null; 

// Режимы монстра
let gameMode = 'normal'; // 'normal' или 'monster'
let iAmMonster = false;
let forceHighlight = false; // для подсветки раз в 15 сек

let difficulty = 'normal';
const diffStats = { easy: { w: 3.0, c: 4.5, kill: 1.0 }, normal: { w: 4.0, c: 5.2, kill: 1.1 }, hard: { w: 4.8, c: 6.8, kill: 1.3 }, extreme: { w: 5.5, c: 8.5, kill: 1.6 } };

const player = { x: 0, y: 1.6, z: 0, vy: 0, gravity: 18, jumpPower: 6, isGrounded: true, speed: 5.5, runMult: 1.55, yaw: 0, pitch: 0, keys: 0, stamina: 100, radius: 0.8, walkTimer: 0, isRunning: false, exhausted: false, flashlightOn: true, isDead: false };
const monsterAI = { x: 0, z: 0, speed: 5.0, dirX: 1, dirZ: 0, bobTimer: 0, tpTimer: 6, path: [], pathIndex: 0, lastKnownPlayer: null, repathTimer: 0, wanderTarget: null, stuckTimer: 0, lastTargetId: null };
const input = { joyActive: false, joyId: null, joyX: 0, joyY: 0, startX: 0, startY: 0, camActive: false, camId: null, lastTouchX: 0, lastTouchY: 0, keys: { w: false, a: false, s: false, d: false } };
const ui = { joyBase: document.getElementById('joystickBase'), joyStick: document.getElementById('joystickStick'), msg: document.getElementById('messages'), staminaBar: document.getElementById('staminaBar'), keysCount: document.getElementById('keysCount'), btnRun: document.getElementById('btnRun') };

// Управление
window.addEventListener('keydown', e => { 
    if(player.isDead) return;
    let k = e.key.toLowerCase(); if(k==='w') input.keys.w = true; if(k==='a') input.keys.a = true; if(k==='s') input.keys.s = true; if(k==='d') input.keys.d = true; 
    if(k==='shift' && !player.exhausted && !iAmMonster) { player.isRunning = true; ui.btnRun.classList.add('active'); } 
    if(e.code==='Space' && player.isGrounded) { player.vy = player.jumpPower; player.isGrounded = false; synth.jump(); } 
});
window.addEventListener('keyup', e => { 
    if(player.isDead) return;
    let k = e.key.toLowerCase(); if(k==='w') input.keys.w = false; if(k==='a') input.keys.a = false; if(k==='s') input.keys.s = false; if(k==='d') input.keys.d = false; 
    if(k==='shift' && !iAmMonster) { player.isRunning = false; ui.btnRun.classList.remove('active'); } 
});

window.addEventListener('touchstart', e => { 
    if(gameState !== 'play') return; 
    for(let i=0; i<e.changedTouches.length; i++) { 
        let touch = e.changedTouches[i]; 
        if(e.target.classList.contains('action-btn') || e.target.id === 'btnFullscreen') continue; 
        if(touch.clientX < window.innerWidth / 2 && !input.joyActive && !player.isDead) { 
            input.joyActive = true; input.joyId = touch.identifier; input.startX = touch.clientX; input.startY = touch.clientY; 
            ui.joyBase.style.display = 'block'; ui.joyBase.style.left = touch.clientX + 'px'; ui.joyBase.style.top = touch.clientY + 'px'; ui.joyStick.style.left = '50%'; ui.joyStick.style.top = '50%'; 
        } else if (touch.clientX >= window.innerWidth / 2 && !input.camActive) { 
            input.camActive = true; input.camId = touch.identifier; input.lastTouchX = touch.clientX; input.lastTouchY = touch.clientY; 
        } 
    } 
}, {passive: false});

window.addEventListener('touchmove', e => { 
    if(gameState !== 'play') return; 
    for(let i=0; i<e.changedTouches.length; i++) { 
        let touch = e.changedTouches[i]; 
        if(input.joyActive && touch.identifier === input.joyId && !player.isDead) { 
            let dx = touch.clientX - input.startX; let dy = touch.clientY - input.startY; let dist = Math.sqrt(dx*dx + dy*dy); let maxDist = 40; 
            if(dist > maxDist) { dx = (dx/dist)*maxDist; dy = (dy/dist)*maxDist; } 
            ui.joyStick.style.left = `calc(50% + ${dx}px)`; ui.joyStick.style.top = `calc(50% + ${dy}px)`; input.joyX = dx / maxDist; input.joyY = -dy / maxDist; 
        } else if(input.camActive && touch.identifier === input.camId) { 
            let deltaX = touch.clientX - input.lastTouchX; let deltaY = touch.clientY - input.lastTouchY; 
            player.yaw -= deltaX * 0.005; player.pitch -= deltaY * 0.005; player.pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, player.pitch)); 
            input.lastTouchX = touch.clientX; input.lastTouchY = touch.clientY; 
        } 
    } 
}, {passive: false});

function handleTouchEnd(e) { 
    for(let i=0; i<e.changedTouches.length; i++) { 
        let touch = e.changedTouches[i]; 
        if(input.joyActive && touch.identifier === input.joyId) { input.joyActive = false; input.joyId = null; input.joyX = 0; input.joyY = 0; ui.joyBase.style.display = 'none'; } 
        else if(input.camActive && touch.identifier === input.camId) { input.camActive = false; input.camId = null; } 
    } 
}
window.addEventListener('touchend', handleTouchEnd); window.addEventListener('touchcancel', handleTouchEnd);

document.getElementById('btnFlashlight').addEventListener('touchstart', (e) => { e.preventDefault(); if(!player.isDead){ player.flashlightOn = !player.flashlightOn; e.target.classList.toggle('active', player.flashlightOn); }});
document.getElementById('btnRun').addEventListener('touchstart', (e) => { e.preventDefault(); if(!player.isDead && !player.exhausted && !iAmMonster) { player.isRunning = !player.isRunning; e.target.classList.toggle('active', player.isRunning); }});
document.getElementById('btnJump').addEventListener('touchstart', (e) => { e.preventDefault(); if(!player.isDead && player.isGrounded) { player.vy = player.jumpPower; player.isGrounded = false; synth.jump(); } });
document.getElementById('btnTeleport').addEventListener('touchstart', (e) => { 
    e.preventDefault(); 
    if(iAmMonster && !player.isDead) { socket.emit('requestTeleport'); document.getElementById('btnTeleport').style.display = 'none'; }
});

// Fullscreen для iPhone Safari (требует webkit)
document.getElementById('btnFullscreen').addEventListener('click', () => {
    let el = document.documentElement;
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (el.requestFullscreen) { el.requestFullscreen().catch(()=>{}); }
        else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); } // Для Safari
    } else {
        if (document.exitFullscreen) { document.exitFullscreen(); }
        else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
    }
});
window.addEventListener('resize', () => { if (camera && renderer) { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); } });

let spectatorTargets = []; let specIndex = 0;
document.getElementById('specPrev').addEventListener('click', () => { specIndex = (specIndex - 1 + spectatorTargets.length) % spectatorTargets.length; });
document.getElementById('specNext').addEventListener('click', () => { specIndex = (specIndex + 1) % spectatorTargets.length; });

function updateSpectatorTargets() {
    spectatorTargets = [];
    if(gameMode === 'normal' || !iAmMonster) spectatorTargets.push({type: 'monster', name: 'МОНСТР'});
    for (let id in onlinePlayers) {
        if (!onlinePlayers[id].info.isDead) spectatorTargets.push({type: 'player', id: id, name: onlinePlayers[id].info.name});
    }
}

function createTexture(colorHex, isWall) { const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 128; const ctx = canvas.getContext('2d'); ctx.fillStyle = colorHex; ctx.fillRect(0,0,128,128); for(let i=0; i<2000; i++) { ctx.fillStyle = Math.random() > 0.5 ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.05)'; ctx.fillRect(Math.random()*128, Math.random()*128, 2, 2); } if (isWall) { ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0, 120, 128, 8); } const tex = new THREE.CanvasTexture(canvas); tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; return tex; }

function init3D() {
    scene = new THREE.Scene(); scene.fog = new THREE.FogExp2(0x1a1813, 0.08);

function buildMapMeshes() {
    const wallMat = new THREE.MeshLambertMaterial({ map: createTexture('#c9b26d', true) }); const floorMat = new THREE.MeshLambertMaterial({ map: createTexture('#756b50', false) }); const ceilMat = new THREE.MeshLambertMaterial({ map: createTexture('#a3a3a3', false) });
    floorMat.map.repeat.set(MAP_SIZE, MAP_SIZE); ceilMat.map.repeat.set(MAP_SIZE, MAP_SIZE);
    const planeGeo = new THREE.PlaneGeometry(MAP_SIZE * BLOCK_SIZE, MAP_SIZE * BLOCK_SIZE);
    const floor = new THREE.Mesh(planeGeo, floorMat); floor.rotation.x = -Math.PI / 2; floor.position.set(MAP_SIZE*BLOCK_SIZE/2, 0, MAP_SIZE*BLOCK_SIZE/2); scene.add(floor);
    const ceiling = new THREE.Mesh(planeGeo, ceilMat); ceiling.rotation.x = Math.PI / 2; ceiling.position.set(MAP_SIZE*BLOCK_SIZE/2, WALL_HEIGHT, MAP_SIZE*BLOCK_SIZE/2); scene.add(ceiling);

    const wallGeo = new THREE.BoxGeometry(BLOCK_SIZE, WALL_HEIGHT, BLOCK_SIZE);
    let wallCount = 0; for(let z=0; z<MAP_SIZE; z++) for(let x=0; x<MAP_SIZE; x++) if(mapData[z][x] === 1) wallCount++;
    const instancedWalls = new THREE.InstancedMesh(wallGeo, wallMat, wallCount);
    let dummy = new THREE.Object3D(); let wallIdx = 0;
    for(let z=0; z<MAP_SIZE; z++) for(let x=0; x<MAP_SIZE; x++) if(mapData[z][x] === 1) { dummy.position.set(x * BLOCK_SIZE, WALL_HEIGHT/2, z * BLOCK_SIZE); dummy.updateMatrix(); instancedWalls.setMatrixAt(wallIdx++, dummy.matrix); }
    scene.add(instancedWalls);

    const keyGeo = new THREE.BoxGeometry(0.8, 0.1, 0.6); const keyMat = new THREE.MeshBasicMaterial({ color: 0x2266ff }); 
    keysMeshes.forEach(k => { let mesh = new THREE.Mesh(keyGeo, keyMat); mesh.position.set(k.x * BLOCK_SIZE, 0.5, k.z * BLOCK_SIZE); scene.add(mesh); k.mesh = mesh; });

    const doorGeo = new THREE.BoxGeometry(BLOCK_SIZE*0.8, WALL_HEIGHT*0.8, 0.2); const doorMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.5 }); exitMesh = new THREE.Mesh(doorGeo, doorMat);
    if(window.exitDoor) { exitMesh.position.set(window.exitDoor.x * BLOCK_SIZE, WALL_HEIGHT*0.4, window.exitDoor.z * BLOCK_SIZE); exitMesh.visible = false; scene.add(exitMesh); }
}

function generateBackroomsOffline() {
    mapData = Array(MAP_SIZE).fill(0).map(() => Array(MAP_SIZE).fill(1));
    let stack = []; let startX = 1; let startZ = 1; mapData[startZ][startX] = 0; stack.push({x: startX, z: startZ});
    while(stack.length > 0) {
        let curr = stack[stack.length - 1]; let neighbors = []; const dirs = [[0, -2], [0, 2], [-2, 0], [2, 0]];
        for(let d of dirs) { let nx = curr.x + d[0]; let nz = curr.z + d[1]; if(nx > 0 && nx < MAP_SIZE-1 && nz > 0 && nz < MAP_SIZE-1 && mapData[nz][nx] === 1) { neighbors.push({x: nx, z: nz, dx: d[0]/2, dz: d[1]/2}); } }
        if(neighbors.length > 0) { let next = neighbors[Math.floor(Math.random() * neighbors.length)]; mapData[curr.z + next.dz][curr.x + next.dx] = 0; mapData[next.z][next.x] = 0; stack.push({x: next.x, z: next.z}); } else { stack.pop(); }
    }
    for(let z=1; z<MAP_SIZE-1; z++) for(let x=1; x<MAP_SIZE-1; x++) if(mapData[z][x] === 1 && Math.random() < 0.25) { let openNeighbors = 0; if(mapData[z-1][x] === 0) openNeighbors++; if(mapData[z+1][x] === 0) openNeighbors++; if(mapData[z][x-1] === 0) openNeighbors++; if(mapData[z][x+1] === 0) openNeighbors++; if (openNeighbors >= 2) mapData[z][x] = 0; }
    for(let i=0; i<MAP_SIZE; i++) { mapData[0][i] = 1; mapData[MAP_SIZE-1][i] = 1; mapData[i][0] = 1; mapData[i][MAP_SIZE-1] = 1; }
    let emptySpots = []; for(let z=1; z<MAP_SIZE-1; z++) for(let x=1; x<MAP_SIZE-1; x++) if(mapData[z][x] === 0) emptySpots.push({x: x, z: z}); emptySpots.sort(() => Math.random() - 0.5);
    let pSpot = emptySpots.pop(); player.x = pSpot.x * BLOCK_SIZE; player.z = pSpot.z * BLOCK_SIZE;
    keysMeshes = []; for(let i=0; i<maxKeysOffline; i++) { let kSpot = emptySpots.pop(); keysMeshes.push({x: kSpot.x, z: kSpot.z, active: true}); }
    let mSpot = emptySpots.find(s => Math.hypot(s.x - pSpot.x, s.z - pSpot.z) > 10) || emptySpots[0]; monsterAI.x = mSpot.x * BLOCK_SIZE; monsterAI.z = mSpot.z * BLOCK_SIZE;
    let eSpot = emptySpots[1]; window.exitDoor = {x: eSpot.x, z: eSpot.z, active: false};
}

function showMessage(text) { ui.msg.textContent = text; ui.msg.style.opacity = 1; msgTimer = 2.0; }
function isWall(gx, gz) { if(gx < 0 || gx >= MAP_SIZE || gz < 0 || gz >= MAP_SIZE) return true; return mapData[Math.floor(gz)][Math.floor(gx)] === 1; }
function canMoveTo(nx, nz, radius) { let col = Math.round(nx / BLOCK_SIZE); let row = Math.round(nz / BLOCK_SIZE); for(let z = row-1; z <= row+1; z++) { for(let x = col-1; x <= col+1; x++) { if(isWall(x, z)) { let wallX = x * BLOCK_SIZE; let wallZ = z * BLOCK_SIZE; let hs = BLOCK_SIZE / 2; if (nx + radius > wallX - hs && nx - radius < wallX + hs && nz + radius > wallZ - hs && nz - radius < wallZ + hs) return false; } } } return true; }
function hasLineOfSight(x0, z0, x1, z1) { let gx0 = Math.floor(x0 / BLOCK_SIZE); let gz0 = Math.floor(z0 / BLOCK_SIZE); let gx1 = Math.floor(x1 / BLOCK_SIZE); let gz1 = Math.floor(z1 / BLOCK_SIZE); let dx = Math.abs(gx1 - gx0); let dz = Math.abs(gz1 - gz0); let sx = (gx0 < gx1) ? 1 : -1; let sz = (gz0 < gz1) ? 1 : -1; let err = dx - dz; while(true) { if(isWall(gx0, gz0)) return false; if(gx0 === gx1 && gz0 === gz1) return true; let e2 = 2 * err; if(e2 > -dz) { err -= dz; gx0 += sx; } if(e2 < dx) { err += dx; gz0 += sz; } } }
function worldToGrid(wx, wz) { return { x: Math.round(wx / BLOCK_SIZE), z: Math.round(wz / BLOCK_SIZE) }; }
function gridNeighbors(node) { const dirs = [[1,0],[-1,0],[0,1],[0,-1]]; const res = []; for (let d of dirs) { const nx = node.x + d[0], nz = node.z + d[1]; if (nx >= 1 && nx < MAP_SIZE-1 && nz >= 1 && nz < MAP_SIZE-1 && mapData[nz][nx] === 0) res.push({x: nx, z: nz}); } return res; }
function heuristic(a, b) { return Math.abs(a.x - b.x) + Math.abs(a.z - b.z); }
function astar(start, goal, maxNodes = 2000) { const key = (n) => `${n.x},${n.z}`; let open = [{node: start, f: heuristic(start, goal), g:0}]; let cameFrom = {}; let gScore = {}; gScore[key(start)] = 0; let closed = new Set(); let nodesProcessed = 0; while (open.length > 0 && nodesProcessed < maxNodes) { open.sort((a,b) => a.f - b.f); let current = open.shift().node; nodesProcessed++; if (current.x === goal.x && current.z === goal.z) { let path = []; let curKey = key(current); while (cameFrom[curKey]) { path.push(current); current = cameFrom[curKey]; curKey = key(current); } path.reverse(); return path; } closed.add(key(current)); for (let neigh of gridNeighbors(current)) { let nkey = key(neigh); if (closed.has(nkey)) continue; let tentativeG = gScore[key(current)] + 1; if (gScore[nkey] === undefined || tentativeG < gScore[nkey]) { cameFrom[nkey] = current; gScore[nkey] = tentativeG; let f = tentativeG + heuristic(neigh, goal); if (!open.some(o => o.node.x===neigh.x && o.node.z===neigh.z)) open.push({node: neigh, f: f, g: tentativeG}); } } } return []; }
function teleportMonsterNear(t) { let validSpots = []; let px = t ? t.x : player.x; let pz = t ? t.z : player.z; for(let z=1; z<MAP_SIZE-1; z++) for(let x=1; x<MAP_SIZE-1; x++) if(mapData[z][x] === 0) { let dist = Math.hypot(x*BLOCK_SIZE - px, z*BLOCK_SIZE - pz); if(dist >= 12 && dist <= 20 && !hasLineOfSight(x*BLOCK_SIZE, z*BLOCK_SIZE, px, pz)) validSpots.push({x: x, z: z}); } if(validSpots.length === 0) for(let z=1; z<MAP_SIZE-1; z++) for(let x=1; x<MAP_SIZE-1; x++) if(mapData[z][x] === 0 && !hasLineOfSight(x*BLOCK_SIZE, z*BLOCK_SIZE, px, pz)) validSpots.push({x: x, z: z}); if(validSpots.length > 0) { let spot = validSpots[Math.floor(Math.random() * validSpots.length)]; monsterAI.x = spot.x * BLOCK_SIZE; monsterAI.z = spot.z * BLOCK_SIZE; } monsterAI.path = []; monsterAI.pathIndex = 0; monsterAI.repathTimer = 0; monsterAI.lastKnownPlayer = null; monsterAI.wanderTarget = null; }

const pathMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.4 }); const pathGeo = new THREE.PlaneGeometry(BLOCK_SIZE * 0.4, BLOCK_SIZE * 0.4);
let playerLastGridX = -1; let playerLastGridZ = -1;
function drawGreenPath(px, pz, ex, ez) { while(window.greenPathGroup.children.length > 0){ window.greenPathGroup.remove(window.greenPathGroup.children[0]); } let start = worldToGrid(px, pz); let goal = worldToGrid(ex, ez); let path = astar(start, goal, 5000); if(path && path.length > 0) { path.forEach(node => { let p = new THREE.Mesh(pathGeo, pathMat); p.rotation.x = -Math.PI / 2; p.position.set(node.x * BLOCK_SIZE, 0.05, node.z * BLOCK_SIZE); window.greenPathGroup.add(p); }); } }

function renderPlayerLabels() {
    if (!isOnline) return;
    const container = document.getElementById('labelsContainer');
    container.innerHTML = '';
    for (let id in onlinePlayers) {
        if (id === myId || onlinePlayers[id].info.isDead) continue;
        let opInfo = onlinePlayers[id].info;
        
        // Подсветка раз в 15 секунд для монстра
        let isVisible = hasLineOfSight(player.x, player.z, opInfo.x, opInfo.z);
        if (iAmMonster && forceHighlight) isVisible = true;
        
        if (!isVisible) continue;

        let pos = onlinePlayers[id].mesh.position.clone();
        pos.y += 2.2; pos.project(camera);
        if (pos.z > 1) continue; // сзади камеры
        
        let x = (pos.x * .5 + .5) * window.innerWidth;
        let y = (pos.y * -.5 + .5) * window.innerHeight;
        
        let label = document.createElement('div');
        label.className = 'player-name-label';
        if (opInfo.isMonster) label.classList.add('monster');
        label.textContent = opInfo.name;
        label.style.left = `${x}px`; label.style.top = `${y}px`;
        container.appendChild(label);
    }
}

let checkTPTimer = 0;

function update(dt) {
    if(gameState !== 'play') return;
    if(msgTimer > 0) { msgTimer -= dt; if(msgTimer <= 0) ui.msg.style.opacity = 0; }

    camera.rotation.y = player.yaw; camera.rotation.x = player.pitch;
    let trueLookDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    let dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion); dir.y = 0; dir.normalize(); 
    let side = new THREE.Vector3(-dir.z, 0, dir.x); 

    let inputX = input.joyX; let inputY = input.joyY;
    if(input.keys.w) inputY = 1; if(input.keys.s) inputY = -1; if(input.keys.a) inputX = -1; if(input.keys.d) inputX = 1;
    let length = Math.sqrt(inputX*inputX + inputY*inputY); if(length > 1) { inputX /= length; inputY /= length; }

    let currentSpeed = player.speed; let isMoving = (Math.abs(inputX) > 0.1 || Math.abs(inputY) > 0.1);

    if(!player.isDead) {
        if (player.isRunning && isMoving && !player.exhausted && !iAmMonster) {
            currentSpeed *= player.runMult; player.stamina -= 25 * dt;
            if(player.stamina <= 0) { player.isRunning = false; player.exhausted = true; ui.btnRun.classList.remove('active'); ui.staminaBar.classList.add('exhausted'); }
        } else {
            player.stamina += 15 * dt; if(player.stamina > 25 && player.exhausted) { player.exhausted = false; ui.staminaBar.classList.remove('exhausted'); }
        }
        player.stamina = Math.max(0, Math.min(100, player.stamina)); ui.staminaBar.style.width = player.stamina + '%';

        let dx = (dir.x * inputY + side.x * inputX) * currentSpeed * dt; let dz = (dir.z * inputY + side.z * inputX) * currentSpeed * dt;
        if (canMoveTo(player.x + dx, player.z, player.radius)) player.x += dx;
        if (canMoveTo(player.x, player.z + dz, player.radius)) player.z += dz;

        player.vy -= player.gravity * dt; player.y += player.vy * dt;
        if(player.y <= 1.6) { if(!player.isGrounded && player.vy < -2) synth.land(); player.y = 1.6; player.vy = 0; player.isGrounded = true; }

        let headBob = 0;
        if (isMoving && player.isGrounded) {
            player.walkTimer += dt * currentSpeed; headBob = Math.sin(player.walkTimer * 2.5) * (player.isRunning ? 0.15 : 0.08);
            if (Math.cos(player.walkTimer * 2.5) < -0.9) { synth.step(); player.walkTimer += 0.5; } 
        }
        camera.position.set(player.x, player.y + headBob, player.z);
        
        if(isOnline && socket) socket.emit('playerMove', {x: player.x, z: player.z, isRunning: player.isRunning, isMoving: isMoving, dirX: dir.x, dirZ: dir.z});

        // Телепорт для игрока-монстра
        if (iAmMonster && isOnline) {
            checkTPTimer += dt;
            if (checkTPTimer >= 1.0) {
                checkTPTimer = 0;
                let allFar = true;
                let alivePlayers = 0;
                for(let id in onlinePlayers) {
                    if (id === myId || onlinePlayers[id].info.isDead) continue;
                    alivePlayers++;
                    let dist = Math.hypot(player.x - onlinePlayers[id].info.x, player.z - onlinePlayers[id].info.z);
                    if (dist <= 20) allFar = false;
                }
                if (allFar && alivePlayers > 0) {
                    if(!document.getElementById('btnTeleport').dataset.wait) {
                        document.getElementById('btnTeleport').dataset.wait = "1";
                        setTimeout(() => { 
                            if(gameState === 'play' && iAmMonster) document.getElementById('btnTeleport').style.display = 'flex'; 
                            document.getElementById('btnTeleport').dataset.wait = "";
                        }, 5000);
                    }
                } else {
                    document.getElementById('btnTeleport').style.display = 'none';
                    document.getElementById('btnTeleport').dataset.wait = "";
                }
            }
        }

    } else if (isOnline) {
        if(spectatorTargets.length > 0) {
            let tgt = spectatorTargets[specIndex];
            if(tgt.type === 'monster') { camera.position.set(monsterAI.x, 3.0, monsterAI.z); document.getElementById('spectatingName').textContent = "МОНСТР (ИИ)"; }
            else {
                let op = onlinePlayers[tgt.id];
                if(op && !op.info.isDead) { camera.position.set(op.info.x, 2.5, op.info.z); document.getElementById('spectatingName').textContent = op.info.name; }
                else { updateSpectatorTargets(); }
            }
        }
    }

    flashlight.position.copy(camera.position);
    let flashSwayX = Math.sin(performance.now()*0.002) * 0.05 * (isMoving && !player.isDead ? 1 : 0);
    let flashSwayY = Math.cos(performance.now()*0.002) * 0.05 * (isMoving && !player.isDead ? 1 : 0);
    flashlight.target.position.copy(camera.position).add(trueLookDir).add(new THREE.Vector3(flashSwayX, flashSwayY, 0));

    // Сбор папок (игрок-монстр не может собирать)
    if (!iAmMonster) {
        keysMeshes.forEach(k => {
            if(k.active && k.mesh) {
                k.mesh.rotation.y += dt; k.mesh.position.y = 0.5 + Math.sin(performance.now()*0.003)*0.1;
                if (!player.isDead && Math.hypot(player.x - k.mesh.position.x, player.z - k.mesh.position.z) < 2.0) {
                    if(isOnline) { k.active = false; k.mesh.visible = false; socket.emit('keyCollected', keysMeshes.indexOf(k)); }
                    else {
                        k.active = false; k.mesh.visible = false; player.keys++; synth.pickup(); ui.keysCount.textContent = `Папки: ${player.keys}/${targetKeys}`; showMessage(`Собрано (${player.keys}/${targetKeys})`);
                        if(player.keys >= targetKeys) { window.exitDoor.active = true; exitMesh.visible = true; showMessage("Выход открыт. Иди по зеленой дорожке."); }
                    }
                }
            }
        });
    }

    if(!player.isDead && !iAmMonster && window.exitDoor && window.exitDoor.active && Math.hypot(player.x - exitMesh.position.x, player.z - exitMesh.position.z) < 3.0) {
        if(gameState !== 'win' && gameState !== 'over') {
            if(isOnline) { socket.emit('playerEscaped'); gameState = 'win'; } 
            else { gameState = 'win'; document.getElementById('endTitle').textContent = "ВЫ ВЫБРАЛИСЬ"; document.getElementById('endTitle').style.color = "#00aa00"; document.getElementById('endText').textContent = "Но Закулисье бесконечно..."; document.getElementById('gameOverScreen').classList.remove('hidden'); }
        }
    }

    // --- ЛОГИКА ИИ МОНСТРА (Если режим normal или оффлайн) ---
    if (!isOnline || gameMode === 'normal') {
        monsterGroup.visible = true;
        let stats = diffStats[difficulty];
        let targetP = null; let mDist = Infinity; let newTargetId = null;

        if (isOnline) {
            for(let id in onlinePlayers) {
                if (id === myId) continue;
                let op = onlinePlayers[id].info;
                if(!op.isDead) { let d = Math.hypot(op.x - monsterAI.x, op.z - monsterAI.z); let score = (id === monsterAI.lastTargetId) ? d - 3.0 : d; if(score < mDist) { mDist = score; targetP = op; newTargetId = id; } }
            }
            if (!player.isDead) { let d = Math.hypot(player.x - monsterAI.x, player.z - monsterAI.z); let score = (myId === monsterAI.lastTargetId) ? d - 3.0 : d; if(score < mDist) { mDist = score; targetP = {x: player.x, z: player.z, isRunning: player.isRunning}; newTargetId = myId; } }
        } else {
            if(!player.isDead) { targetP = player; newTargetId = 'local'; }
        }
        
        monsterAI.lastTargetId = newTargetId;
        let realDistToTarget = targetP ? Math.hypot(targetP.x - monsterAI.x, targetP.z - monsterAI.z) : Infinity;
        let runAI = !isOnline || (isOnline && currentRoom && currentRoom.admin === myId); // Админ считает ИИ

        if (runAI) {
            monsterAI.stuckTimer -= dt;
            let hearsPlayer = targetP && (targetP.isRunning && realDistToTarget < 15.0); 
            let seesPlayer = targetP && hasLineOfSight(monsterAI.x, monsterAI.z, targetP.x, targetP.z);
            let isChasing = seesPlayer || hearsPlayer;
            
            if (isChasing) { monsterAI.tpTimer = 19.0; monsterAI.lastKnownPlayer = worldToGrid(targetP.x, targetP.z); monsterAI.speed = stats.c; } 
            else { monsterAI.speed = stats.w; monsterAI.tpTimer -= dt; if (monsterAI.tpTimer <= 0) { teleportMonsterNear(targetP); monsterAI.tpTimer = 19.0; } }
            
            monsterAI.repathTimer -= dt; const monsterGrid = worldToGrid(monsterAI.x, monsterAI.z);
            let targetX = monsterAI.x; let targetZ = monsterAI.z; let directChase = false;

            if ((seesPlayer && monsterAI.stuckTimer <= 0) || (isChasing && realDistToTarget < BLOCK_SIZE * 1.5)) { targetX = targetP.x; targetZ = targetP.z; directChase = true; monsterAI.path = []; } 
            else if (monsterAI.lastKnownPlayer) {
                if (monsterAI.path.length === 0 || monsterAI.repathTimer <= 0 || monsterAI.pathIndex >= monsterAI.path.length) { 
                    let path = astar(monsterGrid, monsterAI.lastKnownPlayer, 2000); 
                    if (path && path.length > 0) { monsterAI.path = path; monsterAI.pathIndex = (path.length > 1 && path[0].x === monsterGrid.x && path[0].z === monsterGrid.z) ? 1 : 0; } else { monsterAI.lastKnownPlayer = null; } 
                    monsterAI.repathTimer = 0.5; 
                }
                if (monsterAI.lastKnownPlayer && monsterGrid.x === monsterAI.lastKnownPlayer.x && monsterGrid.z === monsterAI.lastKnownPlayer.z) { if (!isChasing) { monsterAI.lastKnownPlayer = null; monsterAI.path = []; } }
            } else {
                if (!monsterAI.wanderTarget || Math.hypot(monsterAI.wanderTarget.x*BLOCK_SIZE - monsterAI.x, monsterAI.wanderTarget.z*BLOCK_SIZE - monsterAI.z) < 1.0 || !monsterAI.path || monsterAI.path.length === 0 || monsterAI.pathIndex >= monsterAI.path.length) {
                    let validSpots = []; for (let z = 1; z < MAP_SIZE - 1; z++) for (let x = 1; x < MAP_SIZE - 1; x++) if (mapData[z][x] === 0) validSpots.push({x: x, z: z});
                    if (validSpots.length > 0) { monsterAI.wanderTarget = validSpots[Math.floor(Math.random() * validSpots.length)]; let path = astar(monsterGrid, monsterAI.wanderTarget, 2000); if (path && path.length > 0) { monsterAI.path = path; monsterAI.pathIndex = (path.length > 1 && path[0].x === monsterGrid.x && path[0].z === monsterGrid.z) ? 1 : 0; } else { monsterAI.path = []; } }
                }
            }
            
            if (!directChase && monsterAI.path && monsterAI.pathIndex < monsterAI.path.length) {
                let targetNode = monsterAI.path[monsterAI.pathIndex]; targetX = targetNode.x * BLOCK_SIZE; targetZ = targetNode.z * BLOCK_SIZE;
                if (Math.hypot(targetX - monsterAI.x, targetZ - monsterAI.z) < 0.4) { monsterAI.pathIndex++; if (monsterAI.pathIndex < monsterAI.path.length) { targetNode = monsterAI.path[monsterAI.pathIndex]; targetX = targetNode.x * BLOCK_SIZE; targetZ = targetNode.z * BLOCK_SIZE; } }
            }

            let mdx = targetX - monsterAI.x; let mdz = targetZ - monsterAI.z; let distToTarget = Math.hypot(mdx, mdz); let movedX = false, movedZ = false;
            if (distToTarget > 0.05) {
                let ndx = mdx / distToTarget; let ndz = mdz / distToTarget; let moveX = ndx * monsterAI.speed * dt; let moveZ = ndz * monsterAI.speed * dt; let botHitbox = 0.1;
                if (canMoveTo(monsterAI.x + moveX, monsterAI.z, botHitbox)) { monsterAI.x += moveX; movedX = true; }
                if (canMoveTo(monsterAI.x, monsterAI.z + moveZ, botHitbox)) { monsterAI.z += moveZ; movedZ = true; }
                if (!movedX && !movedZ) { monsterAI.stuckTimer = 0.5; monsterAI.repathTimer = 0; }
                if (movedX || movedZ) { monsterAI.dirX = ndx; monsterAI.dirZ = ndz; } else if (!directChase && monsterAI.path) { monsterAI.repathTimer = 0; }
            }
            if(isOnline && (movedX || movedZ)) socket.emit('monsterAIMove', {x: monsterAI.x, z: monsterAI.z, dirX: monsterAI.dirX, dirZ: monsterAI.dirZ});
        } else if (isOnline) {
            let mdx = monsterAI.targetX - monsterAI.x; let mdz = monsterAI.targetZ - monsterAI.z;
            if(Math.hypot(mdx, mdz) > 0.1) { monsterAI.x += mdx * dt * 5; monsterAI.z += mdz * dt * 5; }
        }

        monsterAI.bobTimer += dt * 5.0;
        monsterGroup.position.set(monsterAI.x, Math.sin(monsterAI.bobTimer)*0.1, monsterAI.z);
        mArmL.rotation.x = Math.sin(monsterAI.bobTimer * 1.5) * 0.5; mArmR.rotation.x = Math.sin(monsterAI.bobTimer * 1.5 + Math.PI) * 0.5; mLegL.rotation.x = Math.sin(monsterAI.bobTimer * 1.5 + Math.PI) * 0.5; mLegR.rotation.x = Math.sin(monsterAI.bobTimer * 1.5) * 0.5;
        monsterGroup.rotation.y = Math.atan2(monsterAI.dirX, monsterAI.dirZ);

        // Убийство от ИИ
        let myDistToMonster = Math.hypot(player.x - monsterAI.x, player.z - monsterAI.z);
        if (myDistToMonster < 10.0 && !player.isDead) flashlight.intensity = Math.random() < 0.3 ? 0 : 8.0; else flashlight.intensity = player.flashlightOn && !player.isDead ? 8.0 : 0;
        if (!player.isDead && myDistToMonster < stats.kill && gameState !== 'over') killPlayer();

    } else {
        // Режим 'monster', ИИ скрыт, работают игроки
        monsterGroup.visible = false;
        if (!iAmMonster && !player.isDead) {
            let killDist = 1.6;
            for(let id in onlinePlayers) {
                if (onlinePlayers[id].info.isMonster) {
                    let d = Math.hypot(player.x - onlinePlayers[id].info.x, player.z - onlinePlayers[id].info.z);
                    if (d < killDist) killPlayer();
                }
            }
        }
    }
    
    // Отрисовка дорожки к выходу (Всем, включая монстра)
    if (window.exitDoor && window.exitDoor.active && !player.isDead) {
        let pg = worldToGrid(player.x, player.z);
        if (pg.x !== playerLastGridX || pg.z !== playerLastGridZ) { playerLastGridX = pg.x; playerLastGridZ = pg.z; drawGreenPath(player.x, player.z, window.exitDoor.x * BLOCK_SIZE, window.exitDoor.z * BLOCK_SIZE); }
    }

    if (isOnline) {
        for (let id in onlinePlayers) {
            if (id === myId) continue;
            let op = onlinePlayers[id];
            if(op.info.isDead) { op.mesh.visible = false; continue; }
            op.mesh.visible = true; op.mesh.position.x += (op.info.x - op.mesh.position.x) * 0.1; op.mesh.position.z += (op.info.z - op.mesh.position.z) * 0.1;
            
            // Анимация модельки игроков
            if (op.info.isMoving) {
                op.bob += dt * 10;
                op.mesh.position.y = 1.0 + Math.sin(op.bob) * 0.1;
                if(op.info.isMonster) { // Поворот
                    op.mesh.rotation.y = Math.atan2(op.info.dirX, op.info.dirZ);
                }
            }
        }
        renderPlayerLabels();
    }
    renderer.render(scene, camera);
}

function killPlayer() {
    player.isDead = true;
    document.getElementById('btnFlashlight').style.display = 'none';
    document.getElementById('btnRun').style.display = 'none';
    document.getElementById('btnJump').style.display = 'none';
    player.flashlightOn = false; flashlight.intensity = 0;

    if(isOnline) {
        socket.emit('playerDied'); 
        document.getElementById('spectatorUI').style.display = 'block'; 
        updateSpectatorTargets(); 
        showMessage("Вы мертвы. Режим наблюдения.");
    } else {
        gameState = 'over'; synth.screamer(); const screamer = document.getElementById('screamerLayer'); screamer.style.display = 'block'; 
        setTimeout(() => { screamer.style.display = 'none'; document.getElementById('endTitle').textContent = "ВЫ ПОГИБЛИ"; document.getElementById('endTitle').style.color = "#8a0303"; document.getElementById('endText').textContent = "Он оказался быстрее."; document.getElementById('gameOverScreen').classList.remove('hidden'); }, 1200);
    }
}

function loop(time) { let dt = (time - lastTime) / 1000; if(dt > 0.1) dt = 0.1; lastTime = time; update(dt); if(gameState === 'play') requestAnimationFrame(loop); }

document.getElementById('btnStartOffline').addEventListener('click', () => {
    isOnline = false; targetKeys = maxKeysOffline; difficulty = document.getElementById('diffSelect').value;
    synth.init(); if(!scene) init3D(); generateBackroomsOffline(); buildMapMeshes();
    document.getElementById('startScreen').classList.add('hidden');
    gameState = 'play'; requestAnimationFrame((t) => { lastTime = t; requestAnimationFrame(loop); });
});

// --- ОНЛАЙН И ЛОББИ СИСТЕМА ---
document.getElementById('btnOnlineBrowser').addEventListener('click', () => {
    const name = document.getElementById('playerName').value.trim();
    if (!name) return showCustomAlert("Ошибка", "Введите имя!");
    
    isOnline = true; synth.init(); if(!scene) init3D();
    
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('browserScreen').classList.remove('hidden');

    if(!socket) socket = io();
    socket.emit('setName', name);
    socket.emit('getLobbies');

    socket.on('lobbiesList', (lobbies) => {
        const list = document.getElementById('lobbyList');
        list.innerHTML = '';
        let filter = document.getElementById('searchLobby').value.toLowerCase();
        for(let id in lobbies) {
            let l = lobbies[id];
            if(filter && !l.name.toLowerCase().includes(filter)) continue;
            let div = document.createElement('div'); div.className = 'list-item';
            div.innerHTML = `<span><b>${l.name}</b> (${l.playersCount}/${l.max}) ${l.hasPassword ? '🔒' : ''}</span>
                             <button class="menu-btn" style="width: auto; padding: 5px 15px; margin: 0;" ${l.playersCount>=l.max || l.state!=='waiting' ? 'disabled' : ''}>Войти</button>`;
            div.querySelector('button').addEventListener('click', () => {
                if(l.hasPassword) {
                    showCustomAlert("Пароль", "Введите пароль от лобби:", true, (pass) => {
                        if(pass !== null) socket.emit('joinRoom', { roomId: id, password: pass });
                    });
                } else {
                    socket.emit('joinRoom', { roomId: id, password: '' });
                }
            });
            list.appendChild(div);
        }
    });

    socket.on('joinError', (msg) => showCustomAlert("Ошибка", msg));

    socket.on('roomJoined', (room) => {
        currentRoom = room;
        myId = socket.id;
        document.getElementById('browserScreen').classList.add('hidden');
        document.getElementById('createLobbyScreen').classList.add('hidden');
        document.getElementById('lobbyScreen').classList.remove('hidden');
        updateLobbyUI(room);
    });

    socket.on('roomUpdated', (room) => { currentRoom = room; updateLobbyUI(room); });
    socket.on('voteStarted', (data) => renderVoting(data.type, data.time));
    socket.on('voteUpdated', (votesData) => updateVotingUI(votesData));
    
    socket.on('showMonster', (monsterName) => {
        document.getElementById('lobbyTimerText').textContent = "Монстр выбран!";
        document.getElementById('votingArea').innerHTML = `<h3 style="color:red; text-align:center;">МОНСТР: ${monsterName}</h3>`;
    });

    socket.on('gameStarted', (data) => {
        mapData = data.mapData; keysMeshes = data.keys; window.exitDoor = data.exitDoor;
        difficulty = data.difficulty; gameMode = data.gameMode;
        targetKeys = keysMeshes.length;
        ui.keysCount.textContent = `Папки: 0/${targetKeys}`;
        
        if (gameMode === 'normal') {
            monsterAI.x = data.monsterAI.x; monsterAI.z = data.monsterAI.z;
            monsterAI.targetX = monsterAI.x; monsterAI.targetZ = monsterAI.z;
        }

        iAmMonster = (data.monsterId === myId);
        if(iAmMonster) {
            ui.keysCount.textContent = "ВЫ МОНСТР! Найдите всех!";
            ui.keysCount.style.color = "red";
            document.getElementById('btnRun').style.display = 'none'; // Монстр не бегает
            ui.staminaBar.parentElement.style.display = 'none';
        }

        player.x = data.players[myId].x; player.z = data.players[myId].z;

        // Моделька (Для монстра берем ту же или цилиндр)
        for(let id in data.players) {
            let pData = data.players[id];
            let mesh;
            if (pData.isMonster) {
                // Клонируем монстра для отображения другим
                mesh = monsterGroup.clone();
                mesh.visible = true;
            } else {
                let cylGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.8, 16);
                let mat = new THREE.MeshBasicMaterial({ color: pData.color });
                mesh = new THREE.Mesh(cylGeo, mat);
                mesh.position.y = 1.0;
            }
            mesh.position.x = pData.x; mesh.position.z = pData.z;
            if(id !== myId) scene.add(mesh);
            onlinePlayers[id] = { info: pData, mesh: mesh, bob: 0 };
        }

        buildMapMeshes();
        document.getElementById('lobbyScreen').classList.add('hidden');
        gameState = 'play'; requestAnimationFrame((t) => { lastTime = t; requestAnimationFrame(loop); });
    });

    socket.on('playersUpdate', (serverPlayers) => { for(let id in serverPlayers) if(onlinePlayers[id]) onlinePlayers[id].info = serverPlayers[id]; });
    socket.on('monsterAIUpdate', (m) => { monsterAI.targetX = m.x; monsterAI.targetZ = m.z; if(m.dirX!==undefined) monsterAI.dirX = m.dirX; if(m.dirZ!==undefined) monsterAI.dirZ = m.dirZ; });
    socket.on('keyUpdate', (data) => { keysMeshes[data.id].active = false; if(keysMeshes[data.id].mesh) keysMeshes[data.id].mesh.visible = false; ui.keysCount.textContent = `Папки: ${data.count}/${targetKeys}`; synth.pickup(); });
    socket.on('exitOpened', () => { window.exitDoor.active = true; exitMesh.visible = true; showMessage(iAmMonster ? "Выход открыт! Не дайте им уйти!" : "Выход открыт!"); });
    
    socket.on('playerDiedEvent', (id) => { 
        if(onlinePlayers[id]) { onlinePlayers[id].info.isDead = true; onlinePlayers[id].mesh.visible = false; } 
        if(player.isDead) updateSpectatorTargets(); 
    });

    // Локальная подсветка раз в 15 сек
    socket.on('highlightPlayers', () => {
        if(iAmMonster) {
            forceHighlight = true;
            showMessage("Вы чувствуете их...");
            setTimeout(() => { forceHighlight = false; }, 4000);
        }
    });

    socket.on('teleported', (pos) => {
        player.x = pos.x; player.z = pos.z;
        showMessage("ТЕЛЕПОРТАЦИЯ!");
    });

    socket.on('gameWon', (winnerName) => { 
        gameState = 'win'; document.getElementById('spectatorUI').style.display = 'none';
        document.getElementById('endTitle').textContent = iAmMonster ? "ВЫ УПУСТИЛИ ИХ" : "ВЫ ПОБЕДИЛИ"; 
        document.getElementById('endTitle').style.color = iAmMonster ? "#8a0303" : "#00aa00"; 
        document.getElementById('endText').textContent = winnerName + " нашел выход!"; 
        document.getElementById('gameOverScreen').classList.remove('hidden');
    });

    socket.on('gameEnded', (msg) => { 
        gameState = 'over'; document.getElementById('spectatorUI').style.display = 'none';
        document.getElementById('endTitle').textContent = iAmMonster ? "ВЫ ПОЙМАЛИ ВСЕХ" : "ВЫ ПРОИГРАЛИ"; 
        document.getElementById('endTitle').style.color = iAmMonster ? "#00aa00" : "#8a0303"; 
        document.getElementById('endText').textContent = "Все выжившие мертвы."; 
        document.getElementById('gameOverScreen').classList.remove('hidden');
    });
});

// UI Лобби
document.getElementById('btnCreateLobbyUI').addEventListener('click', () => { document.getElementById('browserScreen').classList.add('hidden'); document.getElementById('createLobbyScreen').classList.remove('hidden'); });
document.getElementById('btnCancelCreate').addEventListener('click', () => { document.getElementById('createLobbyScreen').classList.add('hidden'); document.getElementById('browserScreen').classList.remove('hidden'); });
document.getElementById('btnBackToMenu').addEventListener('click', () => location.reload());
document.getElementById('searchLobby').addEventListener('input', () => socket.emit('getLobbies'));

document.getElementById('btnConfirmCreate').addEventListener('click', () => {
    let name = document.getElementById('lobbyName').value.trim() || "Лобби";
    let max = parseInt(document.getElementById('lobbyMax').value);
    if(max < 2 || max > 8) max = 4;
    let pass = document.getElementById('lobbyPass').value.trim();
    socket.emit('createRoom', { name, max, password: pass });
});

document.getElementById('btnLeaveLobby').addEventListener('click', () => {
    socket.emit('leaveRoom');
    document.getElementById('lobbyScreen').classList.add('hidden');
    document.getElementById('browserScreen').classList.remove('hidden');
    socket.emit('getLobbies');
});

function updateLobbyUI(room) {
    document.getElementById('lobbyTitleText').textContent = room.name;
    let pCount = Object.keys(room.players).length;
    document.getElementById('lobbyPlayersCount').textContent = `${pCount}/${room.max}`;
    
    let list = document.getElementById('lobbyPlayersList');
    list.innerHTML = '';
    for(let id in room.players) {
        let p = room.players[id];
        let isAdmin = (id === room.admin);
        let div = document.createElement('div'); div.className = 'list-item';
        div.innerHTML = `<span style="color: ${isAdmin ? '#d4b848' : '#fff'}">${isAdmin ? '[Админ] ' : ''}${p.name}</span>`;
        if (room.admin === myId && id !== myId) { // Админ может исключать
            let kickBtn = document.createElement('button'); kickBtn.textContent = 'X'; kickBtn.style.color = 'red'; kickBtn.onclick = () => socket.emit('kickPlayer', id);
            div.appendChild(kickBtn);
        }
        if(isAdmin) list.prepend(div); else list.appendChild(div);
    }
    
    if (room.state === 'waiting') {
        document.getElementById('votingArea').classList.add('hidden');
        if (pCount >= 2) document.getElementById('lobbyTimerText').textContent = "Ожидание старта или других игроков...";
        else document.getElementById('lobbyTimerText').textContent = "Нужно минимум 2 игрока";
    }
}

function renderVoting(type, time) {
    document.getElementById('votingArea').classList.remove('hidden');
    document.getElementById('lobbyTimerText').textContent = `До конца: ${time} сек`;
    const voteDiv = document.getElementById('voteButtons');
    voteDiv.innerHTML = '';
    
    if (type === 'mode') {
        document.getElementById('voteTitle').textContent = "Выберите режим:";
        let modes = ['normal', 'monster'];
        let labels = ['Обычный (ИИ)', 'Монстр-Игрок'];
        modes.forEach((m, i) => {
            let btn = document.createElement('button'); btn.className = 'menu-btn vote-btn'; btn.textContent = labels[i] + ' (0)';
            btn.onclick = () => { socket.emit('vote', { type: 'mode', val: m }); Array.from(document.querySelectorAll('.vote-btn')).forEach(b=>b.disabled=true); btn.style.borderColor = '#00ff00'; };
            btn.dataset.val = m; btn.dataset.label = labels[i]; voteDiv.appendChild(btn);
        });
    } else if (type === 'diff') {
        document.getElementById('voteTitle').textContent = "Сложность ИИ (или бафф Монстра):";
        let diffs = ['easy', 'normal', 'hard', 'extreme'];
        let labels = ['Лёгкая', 'Нормальная', 'Сложная', 'Экстрим'];
        diffs.forEach((d, i) => {
            let btn = document.createElement('button'); btn.className = 'menu-btn vote-btn'; btn.textContent = labels[i] + ' (0)';
            btn.onclick = () => { socket.emit('vote', { type: 'diff', val: d }); Array.from(document.querySelectorAll('.vote-btn')).forEach(b=>b.disabled=true); btn.style.borderColor = '#00ff00'; };
            btn.dataset.val = d; btn.dataset.label = labels[i]; voteDiv.appendChild(btn);
        });
    }
}

function updateVotingUI(votesData) {
    let btns = document.querySelectorAll('.vote-btn');
    btns.forEach(btn => {
        let val = btn.dataset.val;
        let count = votesData[val] || 0;
        btn.textContent = `${btn.dataset.label} (${count})`;
    });
}

document.getElementById('btnRestart').addEventListener('click', () => location.reload());
</script>
